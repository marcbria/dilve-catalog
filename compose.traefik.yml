services:
  app:
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cataleg.rule=Host(`publicacions.uab.cat`) && PathPrefix(`${BASE_PATH}`)"
      - "traefik.http.routers.cataleg.entrypoints=websecure"
      - "traefik.http.routers.cataleg.tls=true"
      - "traefik.http.routers.cataleg.tls.certresolver=leresolver"
      - "traefik.http.services.cataleg.loadbalancer.server.port=80"
      - "traefik.http.middlewares.strip-cataleg.stripprefix.prefixes=${BASE_PATH}"
      - "traefik.http.routers.cataleg.middlewares=strip-cataleg"
    ports: []
    networks:
      - proxy

networks:
  proxy:
    external: true
