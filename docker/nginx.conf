server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Servir todo el contenido de /data (covers, catalog.csv, colections.csv, etc.)
    location /data/ {
        alias /data/;
    }
}
