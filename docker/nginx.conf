server {
    listen 80;
    server_name _;   # Responde a cualquier nombre de dominio (localhost, publicacions.uab.cat, etc.)

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Servir el contenido de /data (covers, catalog.csv, collections.csv, etc.)
    location /data/ {
        alias /data/;
    }
}
